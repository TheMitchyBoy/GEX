<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GEX Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-dark text-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>GEX Dashboard</h1>
        <a class="btn btn-outline-light" href="/">Refresh</a>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="card bg-secondary mb-3">
            <div class="card-body">
              <h5 class="card-title">Available tickers</h5>
              <ul class="list-group list-group-flush mt-3">
                {% if tickers %}
                  {% for t in tickers %}
                    <li class="list-group-item bg-secondary border-0"><a class="text-light" href="/ticker/{{ t }}">{{ t }}</a></li>
                  {% endfor %}
                {% else %}
                  <li class="list-group-item bg-secondary border-0">No exports yet.</li>
                {% endif %}
              </ul>
            </div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card bg-secondary mb-3">
            <div class="card-body">
              <h5 class="card-title">Getting started</h5>
              <p class="card-text">Run <code>python main.py --ticker SPX</code> to generate exports, then refresh this page.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
