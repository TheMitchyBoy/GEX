name: Daily GEX Exports

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GEX exports for ticker SPX
        env:
          TICKERS: SPX
        run: |
          set -euo pipefail
          mkdir -p data/exports
          IFS=',' read -ra TS <<< "${TICKERS}"
          for t in "${TS[@]}"; do
            echo "Running main.py for $t"
            python main.py --ticker "$t" --no-show || true
          done

      - name: Commit and push CSV exports
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage CSVs in data/exports
          git add data/exports/*.csv || true
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No CSV changes to commit"
          else
            git commit -m "chore: daily GEX exports [skip ci] $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
